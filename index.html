<style>
/* Giữ nguyên style cũ, thêm một số style mới cho danh sách ảnh */
body {
    font-family: 'Inter', sans-serif;

.controls {

label {

<script>
// ------------------- CẤU TRÚC DỮ LIỆU NHIỀU ẢNH -------------------
let imagesList = [];      // mỗi phần tử { id, file, imgElement, name, width, height }
let currentImageId = null;
let canvas = document.getElementById('canvas');
let ctx = canvas.getContext('2d');
let defaultImgLoaded = false;

// Tọa độ khối chữ dạng tỷ lệ (0..1)
let relX = 0.05;    // tỷ lệ theo chiều rộng
let relY = 0.75;    // tỷ lệ theo chiều cao (gần cuối)
let dragging = false, dragOffsetRelX = 0, dragOffsetRelY = 0;

let gpsText = "";
let currentTime = new Date();
let staticTimeEnabled = false;
let staticDateStr = "18/03/2026", staticHour=12, staticMinute=0, staticSecond=0;

// Bản đồ
let map, currentMarker;

// Helper functions
function getMaxLineLength() { return parseInt(document.getElementById('maxLineLength').value) || 50; }
function wrapAddress(text, maxLen) {
    if (text.length <= maxLen) return text;
    let lines = [];
    let segments = text.split(/,\s*/);
    let currentLine = '';
    for (let seg of segments) {
        if (currentLine.length + seg.length + 2 <= maxLen) {
            if (currentLine) currentLine += ', ' + seg;
            else currentLine = seg;
        } else {
            if (currentLine) lines.push(currentLine);
            if (seg.length > maxLen) {
                for (let i=0;i<seg.length;i+=maxLen) lines.push(seg.substr(i,maxLen));
                currentLine = '';
            } else currentLine = seg;
        }
    }
    if (currentLine) lines.push(currentLine);
    if (lines.length===0) for(let i=0;i<text.length;i+=maxLen) lines.push(text.substr(i,maxLen));
    return lines.join(',\n');
}

function autoWrapAddress() {
    let addr = document.getElementById('address');
    let raw = addr.value;
    let wrapped = wrapAddress(raw.replace(/\n/g, ', '), getMaxLineLength());
    if (wrapped !== raw) addr.value = wrapped;
}
document.getElementById('address').addEventListener('blur', autoWrapAddress);
document.getElementById('maxLineLength')?.addEventListener('input', autoWrapAddress);
// Thêm thanh trượt maxLineLength vào (chưa có trong HTML cũ, thêm nhanh)
if(!document.getElementById('maxLineLength')) {
    let sliderRow = document.createElement('div'); sliderRow.className='slider-row';
    sliderRow.innerHTML='<label>🔤 Max ký tự mỗi dòng:</label><input type="range" id="maxLineLength" min="30" max="80" value="50" step="1">';
    document.querySelector('.controls .slider-row:last-child')?.after(sliderRow);
}

// Cập nhật thời gian
function updateCurrentTime() {
    if (staticTimeEnabled) {
        let parts = document.getElementById('staticDate').value.split('/');
        if(parts.length===3){
            let d = parseInt(parts[0]), m=parseInt(parts[1])-1, y=parseInt(parts[2]);
            let h=parseInt(document.getElementById('staticHour').value)||0;
            let min=parseInt(document.getElementById('staticMinute').value)||0;
            let s=parseInt(document.getElementById('staticSecond').value)||0;
            currentTime = new Date(y,m,d,h,min,s);
        } else currentTime = new Date();
    } else currentTime = new Date();
    if (currentImageId !== null) drawCurrentImage();
}
setInterval(() => { if(!staticTimeEnabled && currentImageId!==null) updateCurrentTime(); }, 1000);
document.getElementById('useStaticTime').addEventListener('change', (e)=>{
    staticTimeEnabled=e.target.checked;
    document.getElementById('staticTimeRow').style.display=staticTimeEnabled?'flex':'none';
    updateCurrentTime();
});
['staticDate','staticHour','staticMinute','staticSecond'].forEach
