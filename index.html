<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Đức Thuật Pro - Timemark Chuyên Nghiệp</title>
<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- JSZip -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Montserrat:wght@400;700&family=Roboto&family=Bebas+Neue&family=Lato&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; user-select: none; }
body {
    font-family: 'Inter', sans-serif;
    background: url('https://i.postimg.cc/Bt1xMVQ8/IMG-2821.jpg') no-repeat center fixed;
    background-size: cover;
    margin: 0;
    padding: 10px;
    position: relative;
}
body::before {
    content: "";
    position: fixed;
    top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.55);
    pointer-events: none;
    z-index: 0;
}
.controls, .canvas-container, #map, .footer-logo, .image-list-panel {
    position: relative;
    z-index: 2;
}
.controls {
    background: rgba(30,30,30,0.94);
    backdrop-filter: blur(12px);
    border-radius: 28px;
    padding: 20px;
    max-width: 1200px;
    margin: 0 auto 15px;
    border: 1px solid #f5b400;
}
.row, .slider-row, .checkbox-row, .color-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 12px;
    align-items: center;
    justify-content: center;
}
.slider-row, .checkbox-row, .color-row {
    background: #252525cc;
    padding: 8px 15px;
    border-radius: 40px;
}
label {
    color: #f5b400;
    font-weight: bold;
    min-width: 110px;
    font-size: 13px;
}
input, textarea, select, button {
    padding: 10px 14px;
    border-radius: 40px;
    border: 1px solid #444;
    background: #2a2a2a;
    color: white;
    font-size: 14px;
}
textarea {
    border-radius: 20px;
    background: #1e1e1e;
}
button {
    background: #f5b400;
    color: #000;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
    border: none;
}
button:active { transform: scale(0.96); }
canvas {
    max-width: 100%;
    border-radius: 20px;
    box-shadow: 0 0 20px black;
    cursor: grab;
    display: block;
    margin: 0 auto;
    background: #222;
}
canvas:active { cursor: grabbing; }
#map {
    height: 280px;
    width: 100%;
    border-radius: 20px;
    margin: 15px 0 8px;
    border: 1px solid #f5b400;
}
.image-list-panel {
    background: rgba(0,0,0,0.8);
    border-radius: 28px;
    padding: 15px;
    margin: 15px auto;
    max-width: 1200px;
    backdrop-filter: blur(6px);
    border: 1px solid #f5b400;
}
.thumb-list {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    max-height: 200px;
    overflow-x: auto;
    padding: 8px;
    background: #1e1e1ecc;
    border-radius: 20px;
}
.thumb-item {
    position: relative;
    width: 100px;
    height: 100px;
    border: 2px solid #f5b400;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    background: #2a2a2a;
    flex-shrink: 0;
    transition: 0.1s;
}
.thumb-item img { width:100%; height:100%; object-fit: cover; }
.thumb-item .delete-btn {
    position: absolute; top: 2px; right: 2px;
    background: rgba(0,0,0,0.7);
    color: #ff5555;
    border-radius: 50%;
    width: 22px; height: 22px;
    text-align: center;
    font-weight: bold;
    cursor: pointer;
    z-index: 2;
}
.thumb-item .download-single-btn {
    position: absolute; bottom: 2px; left: 2px;
    background: rgba(0,0,0,0.7);
    color: #4caf50;
    border-radius: 50%;
    width: 22px; height: 22px;
    text-align: center;
    font-weight: bold;
    cursor: pointer;
    z-index: 2;
    font-size: 14px;
    line-height: 22px;
}
.thumb-item.active { border-color: #ffaa00; box-shadow: 0 0 12px #f5b400; }
.progress-bar {
    margin-top: 12px;
    background: #444;
    border-radius: 20px;
    height: 20px;
    overflow: hidden;
    display: none;
}
.progress-fill { width:0%; height:100%; background: #f5b400; transition: width 0.2s; }
.footer-logo { text-align: center; margin: 20px auto; padding: 15px; background: rgba(0,0,0,0.6); border-radius: 40px; max-width: 1200px; }
.footer-logo img { max-width: 100%; max-height: 100px; }
.scroll-top-btn {
    position: fixed; bottom: 20px; right: 20px;
    background: #f5b400; border-radius: 50%; width: 48px; height: 48px;
    font-size: 26px; font-weight: bold; cursor: pointer;
    border: none;
    z-index: 999;
}
</style>
</head>
<body>

<div class="controls">
<h3 style="margin:0 0 15px; color:#f5b400;">📸 Đức Thuật Pro - Timemark (Batch + Chia sẻ Zalo)</h3>
<div class="row">
    <label>📂 Chọn ảnh (nhiều):</label>
    <input type="file" id="uploadMultiple" accept="image/*" multiple>
    <button id="clearAllBtn" style="background:#a94442;">🗑️ Xóa tất cả</button>
</div>
<div class="row">
    <label>📍 Tọa độ GPS (thủ công):</label>
    <input type="text" id="manualCoord" style="flex:1" placeholder="12.1234, 108.5678">
    <button id="applyManualBtn" style="background:#0288d1;">✅ Áp dụng</button>
    <button id="resetRealLocationBtn" style="background:#2c3e66;">🌍 Vị trí thật</button>
</div>
<div class="row">
    <textarea id="address" rows="2" placeholder="Địa chỉ (tự động viết tắt, bỏ Việt Nam)">X Ea Pô, H. Cư Jút, T. Đắk Nông</textarea>
</div>
<div class="row">
    <input type="text" id="mapSearch" placeholder="🔍 Tìm địa điểm...">
    <button onclick="searchMap()">Tìm</button>
    <button onclick="getCurrentPosition()" style="background:#4caf50;">📍 Lấy GPS trình duyệt</button>
</div>
<div class="checkbox-row">
    <label>👁️ Hiển thị tọa độ:</label>
    <input type="checkbox" id="showGpsCheckbox">
    <label style="margin-left:20px;">⏰ Thời gian tĩnh:</label>
    <input type="checkbox" id="useStaticTime">
    <span id="timeBadge" style="background:#f5b400;color:#000;padding:2px 16px;border-radius:40px;">🕒 THỰC</span>
</div>
<div id="staticTimeRow" style="display:none; gap:8px; flex-wrap:wrap; margin:8px 0;">
    <input type="text" id="staticDate" value="18/03/2026" style="width:110px" placeholder="DD/MM/YYYY">
    <input type="number" id="staticHour" value="12" min="0" max="23" style="width:70px">
    <input type="number" id="staticMinute" value="0" min="0" max="59" style="width:70px">
    <input type="number" id="staticSecond" value="0" min="0" max="59" style="width:70px">
    <button onclick="setStaticToNow()">📅 Lấy hiện tại</button>
</div>
<div class="row">
    <label>✏️ Logo text:</label>
    <input type="text" id="logoText" value="Timemark" style="flex:1">
    <label>🎨 Màu 1:</label><input type="color" id="logoColor1" value="#FFC107">
    <label>Màu 2:</label><input type="color" id="logoColor2" value="#FFFFFF">
    <label>Đảo màu:</label><input type="checkbox" id="swapLogoColor">
</div>
<div class="row">
    <label>🎨 Màu địa chỉ:</label><input type="color" id="addrColor" value="#FFFFFF">
    <label>🔤 Font chữ:</label>
    <select id="fontSelect"><option value="Inter">Inter</option><option value="Roboto">Roboto</option><option value="Montserrat">Montserrat</option></select>
    <label>Font giờ:</label>
    <select id="timeFontSelect"><option value="Inter">Inter</option><option value="Bebas Neue">Bebas Neue</option></select>
</div>
<div class="slider-row"><label>📏 Cỡ chữ địa chỉ:</label><input type="range" id="addrFontScale" min="0.6" max="1.5" value="1.0" step="0.01"></div>
<div class="slider-row"><label>🕒 Cỡ giờ:</label><input type="range" id="timeScale" min="0.5" max="2.0" value="1.0" step="0.01"></div>
<div class="slider-row"><label>📅 Cỡ ngày/thứ:</label><input type="range" id="dateScale" min="0.5" max="1.8" value="1.0" step="0.01"></div>
<div class="slider-row"><label>📏 Cỡ logo:</label><input type="range" id="rightScale" min="0.5" max="2.0" value="1.0" step="0.01"></div>
<div class="slider-row"><label>🟨 Độ dày thanh vàng:</label><input type="range" id="barWidth" min="2" max="12" value="4" step="0.5"></div>
<div class="slider-row"><label>🔆 Độ mờ text:</label><input type="range" id="textOpacity" min="0" max="1" value="1" step="0.01"></div>
<div class="slider-row"><label>💡 Bóng đổ:</label><input type="range" id="shadowOpacity" min="0" max="1" value="0.8" step="0.01"></div>
<div class="slider-row"><label>📝 Cỡ ghi chú dọc:</label><input type="range" id="noteFontSize" min="12" max="32" value="18" step="0.5"></div>
<div class="slider-row"><label>🔤 Số ký tự/dòng địa chỉ:</label><input type="range" id="maxLineLength" min="30" max="80" value="50" step="1"></div>
<div class="row">
    <textarea id="verticalNote" placeholder="Ghi chú dọc bên phải (nếu trống sẽ không hiển thị)"></textarea>
</div>
<div class="row">
    <button id="saveSettingsBtn">💾 Lưu cài đặt</button>
    <button id="downloadCurrentBtn" style="background:#2e7d32;">📥 Tải ảnh này (PNG)</button>
    <button id="shareZaloBtn" style="background:#0068ff; color:white;">💬 Gửi ảnh này qua Zalo</button>
    <button id="processAllZipBtn" style="background:#f57c00;">📦 XỬ LÝ TẤT CẢ & TẢI ZIP</button>
</div>
<div id="status" style="background:#000000aa; padding:8px; border-radius:30px; text-align:center; margin-top:10px;">✅ Sẵn sàng. Chọn ảnh để bắt đầu.</div>
</div>

<div class="image-list-panel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h4 style="color:#f5b400;">📸 Thư viện ảnh (<span id="imageCount">0</span>)</h4>
        <div><button id="clearAllImages" style="background:#a94442;">Xóa tất cả</button></div>
    </div>
    <div class="thumb-list" id="thumbList"></div>
</div>

<div class="canvas-container" style="position:relative;">
    <canvas id="canvas" width="800" height="600"></canvas>
    <button class="scroll-top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">⬆️</button>
</div>
<div id="map"></div>
<div class="footer-logo"><a href="https://zalo.me/0866639024" target="_blank"><img src="https://i.postimg.cc/D08K8qBh/IMG-2826.jpg" alt="Logo"></a></div>

<script>
// ---------- BIẾN TOÀN CỤC ----------
let images = [];            
let currentImgId = null;
let canvas = document.getElementById('canvas');
let ctx = canvas.getContext('2d');
let gpsText = "";
let isCoordManuallyEdited = false;
let currentTime = new Date();
let staticTimeEnabled = false;
let relX = 0.05, relY = 0.72;
let dragging = false, dragStartRelX = 0, dragStartRelY = 0;
let leftBlockX = 0, leftBlockY = 0;
let map, currentMarker;

// ========== ẢNH MẶC ĐỊNH ==========
let defaultImg = new Image();
defaultImg.crossOrigin = "Anonymous";
defaultImg.src = "https://i.postimg.cc/Bt1xMVQ8/IMG-2821.jpg";
defaultImg.onload = () => {
    if(images.length === 0) {
        images.push({ id: -1, imgElement: defaultImg, name: "default_background", width: defaultImg.width, height: defaultImg.height, isDefault: true });
        setCurrentImage(-1);
        document.getElementById('status').innerHTML = "✅ Ảnh nền mặc định. Bạn có thể upload ảnh của mình";
    }
};
defaultImg.onerror = () => console.warn("Không tải được ảnh mặc định");

// ========== XỬ LÝ ĐỊA CHỈ ==========
function abbreviatePart(p) {
    p = p.trim();
    const map = { "Quốc lộ":"QL.", "Đường":"Đ.", "Xã":"X.", "Huyện":"H.", "Tỉnh":"T.", "Thành phố":"TP.", "Phường":"P.", "Thị trấn":"TT.", "Thôn":"Th.", "Xóm":"X.", "Quận":"Q.", "Thị xã":"TX." };
    for(let [full, short] of Object.entries(map)) {
        if(new RegExp(`^${full}\\s+`, 'i').test(p)) return p.replace(new RegExp(`^${full}\\s+`, 'i'), short+" ");
    }
    return p;
}
function formatAddress(raw) {
    if(!raw) return "";
    let parts = raw.split(/,\s*/).filter(p=>p.trim());
    if(parts.length && parts[parts.length-1].toLowerCase() === "việt nam") parts.pop();
    return parts.map(p=>abbreviatePart(p)).join(" . ");
}
function wrapAddress(formatted, maxLen) {
    if(formatted.length <= maxLen) return formatted;
    let segments = formatted.split(" . ");
    let lines = [], cur = "";
    for(let seg of segments) {
        let test = cur ? cur+" . "+seg : seg;
        if(test.length <= maxLen) cur = test;
        else {
            if(cur) lines.push(cur);
            cur = seg;
            if(seg.length > maxLen) for(let i=0;i<seg.length;i+=maxLen) lines.push(seg.substr(i,maxLen));
        }
    }
    if(cur) lines.push(cur);
    return lines.join('\n');
}
function getAddressLines() {
    let raw = document.getElementById('address').value;
    let formatted = formatAddress(raw);
    let maxLen = parseInt(document.getElementById('maxLineLength').value) || 50;
    let wrapped = wrapAddress(formatted, maxLen);
    let lines = wrapped.split('\n');
    if(lines.length===0) lines=[""];
    if(lines.length===1) lines.push("");
    return lines.slice(0,2);
}
document.getElementById('address').addEventListener('blur', function(){
    let raw = this.value;
    let formatted = formatAddress(raw);
    let maxLen = parseInt(document.getElementById('maxLineLength').value) || 50;
    this.value = wrapAddress(formatted, maxLen);
    if(currentImgId!==null) drawCurrentImage();
});
document.getElementById('maxLineLength').addEventListener('input', function(){
    let raw = document.getElementById('address').value;
    let formatted = formatAddress(raw);
    let maxLen = parseInt(this.value) || 50;
    document.getElementById('address').value = wrapAddress(formatted, maxLen);
    if(currentImgId!==null) drawCurrentImage();
});

// ========== GPS & BẢN ĐỒ ==========
async function fetchRealLocation() {
    if(!navigator.geolocation) { document.getElementById('status').innerHTML="⚠️ Trình duyệt không hỗ trợ GPS"; return false; }
    return new Promise((resolve)=>{
        navigator.geolocation.getCurrentPosition(async (pos)=>{
            let lat = pos.coords.latitude.toFixed(6), lng = pos.coords.longitude.toFixed(6);
            gpsText = `${lat}, ${lng}`;
            document.getElementById('manualCoord').value = gpsText;
            document.getElementById('status').innerHTML = `📍 Vị trí thật: ${gpsText}`;
            if(map) updateMapLocation(parseFloat(lat), parseFloat(lng));
            if(currentImgId!==null) drawCurrentImage();
            resolve(true);
        }, (err)=>{ console.warn(err); resolve(false); }, {timeout:8000});
    });
}
function markManualCoord() { isCoordManuallyEdited=true; gpsText=document.getElementById('manualCoord').value.trim(); if(currentImgId!==null) drawCurrentImage(); }
document.getElementById('applyManualBtn').onclick = ()=>{ markManualCoord(); };
document.getElementById('resetRealLocationBtn').onclick = ()=>{ isCoordManuallyEdited=false; fetchRealLocation(); };
document.getElementById('manualCoord').addEventListener('change', markManualCoord);
window.getCurrentPosition = function(){ isCoordManuallyEdited=false; fetchRealLocation(); };
async function updateMapLocation(lat,lng){
    if(!map) return;
    map.setView([lat,lng],14);
    if(currentMarker) map.removeLayer(currentMarker);
    currentMarker = L.marker([lat,lng]).addTo(map).bindPopup(`📌 ${lat}, ${lng}`).openPopup();
    try{
        let res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
        let data = await res.json();
        if(data.display_name) {
            let formatted = formatAddress(data.display_name);
            let maxLen = parseInt(document.getElementById('maxLineLength').value) || 50;
            document.getElementById('address').value = wrapAddress(formatted, maxLen);
        }
        if(currentImgId!==null) drawCurrentImage();
    }catch(e){}
}
window.searchMap = async function(){
    let q = document.getElementById('mapSearch').value;
    if(!q) return;
    let url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1`;
    try{
        let res = await fetch(url,{headers:{'User-Agent':navigator.userAgent}});
        let data = await res.json();
        if(data.length){
            let lat = parseFloat(data[0].lat), lon = parseFloat(data[0].lon);
            gpsText = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
            document.getElementById('manualCoord').value = gpsText;
            isCoordManuallyEdited = true;
            if(map) updateMapLocation(lat,lon);
            if(currentImgId!==null) drawCurrentImage();
        } else alert("Không tìm thấy");
    }catch(e){ alert("Lỗi tìm kiếm"); }
};
function initMap(){
    map = L.map('map').setView([12.238791,109.196749],6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    setTimeout(()=>map.invalidateSize(),200);
    map.on('click', async (e)=>{
        let lat = e.latlng.lat.toFixed(6), lng = e.latlng.lng.toFixed(6);
        gpsText = `${lat}, ${lng}`;
        document.getElementById('manualCoord').value = gpsText;
        isCoordManuallyEdited = true;
        if(currentMarker) map.removeLayer(currentMarker);
        currentMarker = L.marker([lat,lng]).addTo(map).bindPopup(`📍 ${gpsText}`).openPopup();
        try{
            let res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
            let data = await res.json();
            if(data.display_name) {
                let formatted = formatAddress(data.display_name);
                let maxLen = parseInt(document.getElementById('maxLineLength').value) || 50;
                document.getElementById('address').value = wrapAddress(formatted, maxLen);
            }
        }catch(e){}
        if(currentImgId!==null) drawCurrentImage();
    });
}

// ========== THỜI GIAN ==========
function syncStatic(){ staticDateStr=document.getElementById('staticDate').value; staticHour=parseInt(document.getElementById('staticHour').value)||0; staticMinute=parseInt(document.getElementById('staticMinute').value)||0; staticSecond=parseInt(document.getElementById('staticSecond').value)||0; }
function updateCurrentTime(){
    if(staticTimeEnabled){
        syncStatic();
        let parts = staticDateStr.split('/');
        if(parts.length===3){ let d=parseInt(parts[0]), m=parseInt(parts[1])-1, y=parseInt(parts[2]); currentTime = new Date(y,m,d,staticHour,staticMinute,staticSecond); }
        else currentTime = new Date();
    } else currentTime = new Date();
    if(currentImgId!==null) drawCurrentImage();
}
setInterval(()=>{ if(!staticTimeEnabled && currentImgId!==null) updateCurrentTime(); }, 1000);
document.getElementById('useStaticTime').addEventListener('change',(e)=>{ staticTimeEnabled=e.target.checked; document.getElementById('staticTimeRow').style.display=staticTimeEnabled?'flex':'none'; document.getElementById('timeBadge').innerHTML=staticTimeEnabled?'⏸️ TĨNH':'🕒 THỰC'; updateCurrentTime(); });
document.getElementById('staticDate').addEventListener('input',updateCurrentTime);
document.getElementById('staticHour').addEventListener('input',updateCurrentTime);
document.getElementById('staticMinute').addEventListener('input',updateCurrentTime);
document.getElementById('staticSecond').addEventListener('input',updateCurrentTime);
window.setStaticToNow = function(){
    let n=new Date();
    document.getElementById('staticDate').value = `${String(n.getDate()).padStart(2,'0')}/${String(n.getMonth()+1).padStart(2,'0')}/${n.getFullYear()}`;
    document.getElementById('staticHour').value=n.getHours();
    document.getElementById('staticMinute').value=n.getMinutes();
    document.getElementById('staticSecond').value=n.getSeconds();
    if(!document.getElementById('useStaticTime').checked) document.getElementById('useStaticTime').click();
    updateCurrentTime();
};

// ========== QUẢN LÝ DANH SÁCH ẢNH ==========
let nextId = 1;
function addImage(file){
    let reader = new FileReader();
    reader.onload = (e)=>{
        let img = new Image();
        img.onload = ()=>{
            let id = nextId++;
            images.push({ id:id, imgElement:img, name:file.name, width:img.width, height:img.height });
            renderThumbnails();
            if(currentImgId === null || currentImgId === -1) setCurrentImage(id);
            document.getElementById('imageCount').innerText = images.filter(i=>!i.isDefault).length;
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}
document.getElementById('uploadMultiple').addEventListener('change', (e)=>{
    for(let file of e.target.files) addImage(file);
    e.target.value = '';
});
function renderThumbnails(){
    let container = document.getElementById('thumbList');
    container.innerHTML = '';
    for(let img of images){
        if(img.isDefault) continue;
        let div = document.createElement('div');
        div.className = 'thumb-item' + (currentImgId === img.id ? ' active' : '');
        let thumb = document.createElement('img'); thumb.src = img.imgElement.src;
        let del = document.createElement('div'); del.className = 'delete-btn'; del.innerHTML = '✕'; del.onclick = (e)=>{ e.stopPropagation(); removeImage(img.id); };
        let dls = document.createElement('div'); dls.className = 'download-single-btn'; dls.innerHTML = '⬇️'; dls.onclick = (e)=>{ e.stopPropagation(); downloadSingleImage(img.id); };
        div.appendChild(thumb); div.appendChild(del); div.appendChild(dls);
        div.onclick = ()=> setCurrentImage(img.id);
        container.appendChild(div);
    }
}
function removeImage(id){
    let idx = images.findIndex(i=>i.id===id);
    if(idx!==-1) images.splice(idx,1);
    if(currentImgId === id){
        let nextImg = images.find(i=>!i.isDefault);
        if(nextImg) setCurrentImage(nextImg.id);
        else if(images.find(i=>i.isDefault)) setCurrentImage(-1);
        else currentImgId=null;
    }
    renderThumbnails();
    document.getElementById('imageCount').innerText = images.filter(i=>!i.isDefault).length;
}
document.getElementById('clearAllImages').onclick = ()=>{
    images = images.filter(i=>i.isDefault);
    if(images.length===1 && images[0].isDefault) setCurrentImage(-1);
    else currentImgId=null;
    renderThumbnails();
    document.getElementById('imageCount').innerText = 0;
    if(currentImgId===null && images.length) setCurrentImage(images[0].id);
    else drawCurrentImage();
};
function setCurrentImage(id){
    currentImgId = id;
    let imgObj = images.find(i=>i.id===id);
    if(!imgObj) return;
    canvas.width = imgObj.width;
    canvas.height = imgObj.height;
    leftBlockX = relX * canvas.width;
    leftBlockY = relY * canvas.height;
    renderThumbnails();
    drawCurrentImage();
}
async function downloadSingleImage(id){
    let imgObj = images.find(i=>i.id===id);
    if(!imgObj) return;
    let oldId = currentImgId;
    let oldCanvasW = canvas.width, oldCanvasH = canvas.height;
    let oldLeftX = leftBlockX, oldLeftY = leftBlockY;
    canvas.width = imgObj.width;
    canvas.height = imgObj.height;
    leftBlockX = relX * canvas.width;
    leftBlockY = relY * canvas.height;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(imgObj.imgElement,0,0,canvas.width,canvas.height);
    drawTextOverlay();  
    let link = document.createElement('a');
    link.download = `${imgObj.name.replace(/\.[^/.]+$/, '')}_timemark.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    canvas.width = oldCanvasW;
    canvas.height = oldCanvasH;
    leftBlockX = oldLeftX;
    leftBlockY = oldLeftY;
    if(oldId !== null) setCurrentImage(oldId);
    else drawCurrentImage();
}

// ========== VẼ TEXT CHÍNH ==========
function drawTextOverlay(){
    const getVal = (id,def)=>{ let el=document.getElementById(id); return el?parseFloat(el.value):def; };
    const getChecked = (id,def)=>{ let el=document.getElementById(id); return el?el.checked:def; };
    const getColor = (id,def)=>{ let el=document.getElementById(id); return el?el.value:def; };
    const getSelect = (id,def)=>{ let el=document.getElementById(id); return el?el.value:def; };
    
    let addrFontScale = getVal('addrFontScale',1.0);
    let timeScale = getVal('timeScale',1.0);
    let dateScale = getVal('dateScale',1.0);
    let rightScale = getVal('rightScale',1.0);
    let barWidthVal = getVal('barWidth',4);
    let textOpacity = getVal('textOpacity',1);
    let shadowOpacity = getVal('shadowOpacity',0.8);
    let noteFontSize = getVal('noteFontSize',18) * (canvas.height/1080);
    let notePadding = 15 * (canvas.width/1080);
    let fontFamily = getSelect('fontSelect','Inter');
    let timeFontFamily = getSelect('timeFontSelect','Bebas Neue');
    let showGps = getChecked('showGpsCheckbox',false);
    let verticalNote = document.getElementById('verticalNote')?.value.trim() || "";
    let logoText = document.getElementById('logoText')?.value.trim() || "";
    let logoColor1 = getColor('logoColor1','#FFC107');
    let logoColor2 = getColor('logoColor2','#FFFFFF');
    let swapLogo = getChecked('swapLogoColor',false);
    let addrColor = getColor('addrColor','#FFFFFF');
    
    let timeStr = `${currentTime.getHours().toString().padStart(2,'0')}:${currentTime.getMinutes().toString().padStart(2,'0')}`;
    let dateStr = `${currentTime.getDate().toString().padStart(2,'0')}/${(currentTime.getMonth()+1).toString().padStart(2,'0')}/${currentTime.getFullYear()}`;
    let dayStr = currentTime.toLocaleDateString('vi-VN', { weekday: 'long' });
    let addrLines = getAddressLines();
    
    // 1. Font & kích thước giờ
    let timeFontSize = 100 * (canvas.height/1080) * timeScale;
    ctx.font = `700 ${timeFontSize}px ${timeFontFamily}`;
    let timeMetrics = ctx.measureText(timeStr);
    let timeWidth = timeMetrics.width;
    let timeAscent = timeMetrics.actualBoundingBoxAscent || timeFontSize*0.8;
    let timeDescent = timeMetrics.actualBoundingBoxDescent || timeFontSize*0.2;
    let timeActualHeight = timeAscent + timeDescent;
    
    // 2. Vị trí block giờ
    let barX = leftBlockX + timeWidth + 12;
    let barWidthPx = barWidthVal * (canvas.width/1080);
    let barHeightPx = timeActualHeight;
    let barTop = leftBlockY;
    let barBottom = barTop + barHeightPx;
    
    ctx.fillStyle = '#FFC107';
    ctx.fillRect(barX, barTop, barWidthPx, barHeightPx);
    let rightColX = barX + barWidthPx + 12;
    
    // 3. Vẽ chữ Thứ & Ngày
    let dayFontSize = 26 * (canvas.height/1080) * dateScale;
    let dateFontSize = 30 * (canvas.height/1080) * dateScale;
    ctx.font = `500 ${dayFontSize}px ${fontFamily}`;
    let dayMetrics = ctx.measureText(dayStr);
    let dayAscent = dayMetrics.actualBoundingBoxAscent || dayFontSize*0.8;
    let dayY = barTop + dayAscent;
    
    ctx.font = `500 ${dateFontSize}px ${fontFamily}`;
    let dateMetrics = ctx.measureText(dateStr);
    let dateDescent = dateMetrics.actualBoundingBoxDescent || dateFontSize*0.2;
    let dateY = barBottom - dateDescent;
    
    ctx.shadowColor = `rgba(0,0,0,${shadowOpacity})`;
    ctx.shadowBlur = 8;
    let commonColor = `rgba(255,255,220,${textOpacity*0.92})`;
    ctx.fillStyle = commonColor;
    ctx.fillText(dayStr, rightColX, dayY);
    ctx.fillStyle = commonColor;
    ctx.fillText(dateStr, rightColX, dateY);
    
    // 4. Vẽ giờ
    ctx.font = `700 ${timeFontSize}px ${timeFontFamily}`;
    ctx.fillStyle = `rgba(255,255,255,${textOpacity})`;
    let timeY = leftBlockY + timeAscent;
    ctx.fillText(timeStr, leftBlockX, timeY);
    
    // 5. Địa chỉ với khoảng cách tự động
    let dateBottomEdge = dateY + dateDescent;
    let fixedSpacing = 35 * (canvas.height/1080);
    let addrStartY = dateBottomEdge + fixedSpacing;
    let addrFontSizePx = 24 * (canvas.height/1080) * addrFontScale;
    ctx.font = `400 ${addrFontSizePx}px ${fontFamily}`;
    let rgbAddr = parseInt(addrColor.slice(1,3),16)+','+parseInt(addrColor.slice(3,5),16)+','+parseInt(addrColor.slice(5,7),16);
    ctx.fillStyle = `rgba(${rgbAddr},${textOpacity*0.88})`;
    
    ctx.fillText(addrLines[0], leftBlockX, addrStartY);
    if(addrLines[1] && addrLines[1].trim() !== ""){
        let line2Y = addrStartY + addrFontSizePx * 1.25;
        ctx.fillText(addrLines[1], leftBlockX, line2Y);
    }
    
    // 6. Logo góc phải
    if(logoText){
        let logoFontSizePx = 28 * (canvas.width/1080) * rightScale;
        let subFontSize = 20 * (canvas.width/1080);
        ctx.font = `700 ${logoFontSizePx}px ${fontFamily}`;
        ctx.textAlign = 'right';
        let logoX = canvas.width - 20;
        let logoYBase = canvas.height - 20;
        let logoY = logoYBase - subFontSize - 8;
        if(logoText.toLowerCase().startsWith('time')){
            let t = logoText.substring(0,4), m = logoText.substring(4);
            let w = ctx.measureText(m).width;
            let col1=swapLogo?logoColor2:logoColor1, col2=swapLogo?logoColor1:logoColor2;
            ctx.fillStyle = col2; ctx.fillText(m, logoX, logoY);
            ctx.fillStyle = col1; ctx.fillText(t, logoX - w, logoY);
        } else { ctx.fillStyle = logoColor1; ctx.fillText(logoText, logoX, logoY); }
        ctx.font = `400 ${subFontSize}px ${fontFamily}`;
        ctx.fillStyle = `rgba(255,255,255,${textOpacity*0.7})`;
        ctx.fillText('100% Chân thực', logoX, logoYBase);
        ctx.textAlign = 'left';
    }
    
    // 7. GPS
    if(showGps && gpsText){
        ctx.font = `400 ${20*(canvas.height/1080)}px ${fontFamily}`;
        ctx.fillStyle = `rgba(160,220,255,${textOpacity})`;
        ctx.fillText(gpsText, leftBlockX, canvas.height - 15);
    }
    
    // 8. Ghi chú dọc (CHỈ HIỂN THỊ KHI CÓ NỘI DUNG)
    if(verticalNote && verticalNote !== ""){
        ctx.save();
        ctx.font = `500 ${noteFontSize}px ${fontFamily}`;
        ctx.fillStyle = `rgba(255,255,255,${textOpacity*0.85})`;
        ctx.translate(canvas.width - notePadding, canvas.height/2);
        ctx.rotate(-Math.PI/2);
        ctx.textAlign = 'center';
        ctx.fillText('✓ '+verticalNote, 0, 0);
        ctx.restore();
    }
    ctx.shadowColor = 'transparent';
}

function drawCurrentImage(){
    let imgObj = images.find(i=>i.id===currentImgId);
    if(!imgObj) return;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(imgObj.imgElement,0,0,canvas.width,canvas.height);
    drawTextOverlay();
}

// ========== KÉO THẢ ==========
function handleDragStart(e){
    dragging = true;
    let rect = canvas.getBoundingClientRect();
    let cx = e.clientX??(e.touches?e.touches[0].clientX:0);
    let cy = e.clientY??(e.touches?e.touches[0].clientY:0);
    let mx = (cx - rect.left) * (canvas.width/rect.width);
    let my = (cy - rect.top) * (canvas.height/rect.height);
    dragStartRelX = mx - leftBlockX;
    dragStartRelY = my - leftBlockY;
}
function handleDragMove(e){
    if(!dragging) return;
    let rect = canvas.getBoundingClientRect();
    let cx = e.clientX??(e.touches?e.touches[0].clientX:0);
    let cy = e.clientY??(e.touches?e.touches[0].clientY:0);
    let mx = (cx - rect.left) * (canvas.width/rect.width);
    let my = (cy - rect.top) * (canvas.height/rect.height);
    let newX = mx - dragStartRelX;
    let newY = my - dragStartRelY;
    newX = Math.min(Math.max(newX,10), canvas.width-200);
    newY = Math.min(Math.max(newY,20), canvas.height-150);
    leftBlockX = newX;
    leftBlockY = newY;
    relX = leftBlockX / canvas.width;
    relY = leftBlockY / canvas.height;
    drawCurrentImage();
}
function handleDragEnd(){ dragging=false; }
canvas.addEventListener('mousedown', handleDragStart);
canvas.addEventListener('mousemove', handleDragMove);
canvas.addEventListener('mouseup', handleDragEnd);
canvas.addEventListener('touchstart', (e)=>{ e.preventDefault(); handleDragStart(e); }, {passive:false});
canvas.addEventListener('touchmove', (e)=>{ e.preventDefault(); handleDragMove(e); }, {passive:false});
canvas.addEventListener('touchend', handleDragEnd);

// ========== LƯU CÀI ĐẶT ==========
function getVal(id,def){ let el=document.getElementById(id); return el?parseFloat(el.value):def; }
function getChecked(id,def){ let el=document.getElementById(id); return el?el.checked:def; }

    };

function loadSettings(){
    let s = localStorage.getItem('ducthuatSettings');
    if(s){
        let c = JSON.parse(s);
        if(c.address) document.getElementById('address').value = c.address;
        if(c.manualCoord) { document.getElementById('manualCoord').value = c.manualCoord; gpsText=c.manualCoord; isCoordManuallyEdited=true; }
        if(c.useStaticTime!==undefined) document.getElementById('useStaticTime').checked = c.useStaticTime;
        if(c.staticDate) document.getElementById('staticDate').value = c.staticDate;
        if(c.staticHour) document.getElementById('staticHour').value = c.staticHour;
        if(c.staticMinute) document.getElementById('staticMinute').value = c.staticMinute;
        if(c.staticSecond) document.getElementById('staticSecond').value = c.staticSecond;
        if(c.logoText) document.getElementById('logoText').value = c.logoText;
        if(c.logoColor1) document.getElementById('logoColor1').value = c.logoColor1;
        if(c.logoColor2) document.getElementById('logoColor2').value = c.logoColor2;
        if(c.swapLogo!==undefined) document.getElementById('swapLogoColor').checked = c.swapLogo;
        if(c.addrColor) document.getElementById('addrColor').value = c.addrColor;
        if(c.verticalNote) document.getElementById('verticalNote').value = c.verticalNote;
        if(c.addrFontScale) document.getElementById('addrFontScale').value = c.addrFontScale;
        if(c.timeScale) document.getElementById('timeScale').value = c.timeScale;
        if(c.dateScale) document.getElementById('dateScale').value = c.dateScale;
        if(c.rightScale) document.getElementById('rightScale').value = c.rightScale;
        if(c.barWidth) document.getElementById('barWidth').value = c.barWidth;
        if(c.textOpacity) document.getElementById('textOpacity').value = c.textOpacity;
        if(c.shadowOpacity) document.getElementById('shadowOpacity').value = c.shadowOpacity;
        if(c.noteFontSize) document.getElementById('noteFontSize').value = c.noteFontSize;
        if(c.maxLineLength) document.getElementById('maxLineLength').value = c.maxLineLength;
        if(c.fontSelect) document.getElementById('fontSelect').value = c.fontSelect;
        if(c.timeFontSelect) document.getElementById('timeFontSelect').value = c.timeFontSelect;
        if(c.showGps!==undefined) document.getElementById('showGpsCheckbox').checked = c.showGps;
        if(c.relX) relX = c.relX;
        if(c.relY) relY = c.relY;
        updateCurrentTime();
        if(currentImgId!==null) drawCurrentImage();
    }
}

// ========== BATCH ZIP ==========
document.getElementById('processAllZipBtn').onclick = async ()=>{
    let real = images.filter(i=>!i.isDefault);
    if(real.length===0){ alert("Chưa có ảnh nào để xử lý!"); return; }
    let zip = new JSZip();
    let total = real.length, processed=0;
    let pb = document.getElementById('progressBar'); pb.style.display='block';
    let fill = document.querySelector('.progress-fill');
    for(let img of real){
        currentImgId = img.id;
        drawCurrentImage();
        await new Promise(r=>setTimeout(r,30));
        let dataURL = canvas.toDataURL('image/png');
        let base64 = dataURL.split(',')[1];
        zip.file(`${img.name.replace(/\.[^/.]+$/, '')}_timemark.png`, base64, {base64:true});
        processed++;
        fill.style.width = (processed/total*100)+'%';
    }
    let content = await zip.generateAsync({type:'blob'});
    let link = document.createElement('a');
    link.href = URL.createObjectURL(content);
    link.download = `ducthuat_batch_${Date.now()}.zip`;
    link.click();
    pb.style.display='none';
    alert("Đã xuất ZIP thành công!");
};
document.getElementById('downloadCurrentBtn').onclick = ()=>{
    if(!currentImgId){ alert("Chưa chọn ảnh"); return; }
    let link = document.createElement('a');
    link.download = `timemark_${Date.now()}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
};
document.getElementById('shareZaloBtn').onclick = async ()=>{
    if(!currentImgId){ alert("Chưa có ảnh để chia sẻ"); return; }
    try{
        let blob = await new Promise(resolve=>canvas.toBlob(resolve, 'image/png'));
        let file = new File([blob], 'timemark.png', {type:'image/png'});
        if(navigator.canShare && navigator.canShare({files:[file]})){
            await navigator.share({ files:[file], title:'Timemark'});
            document.getElementById('status').innerHTML = "✅ Đã chia sẻ thành công";
        } else {
            alert("Trình duyệt không hỗ trợ chia sẻ trực tiếp. Bạn có thể tải ảnh về và gửi thủ công qua Zalo.");
        }
    }catch(e){
        if(e.message && e.message.includes('canceled')) document.getElementById('status').innerHTML = "⚠️ Hủy chia sẻ";
        else alert("Lỗi chia sẻ: "+e.message);
    }
};
